name: CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create google-services.json
        run: printenv GCP_SA_KEY > android/app/google-services.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Verify google-services.json
        run: |
          ls android/app
          cat android/app/google-services.json
          
      - name: Create .env file
        run: |
          echo "ANDROID_API_KEY=${{ secrets.ANDROID_API_KEY }}" > .env
          echo "ANDROID_APP_ID=${{ secrets.ANDROID_APP_ID }}" >> .env
          echo "MESSAGING_SENDER_ID=${{ secrets.MESSAGING_SENDER_ID }}" >> .env
          echo "PROJECT_ID=${{ secrets.PROJECT_ID }}" >> .env
          echo "STORAGE_BUCKET=${{ secrets.STORAGE_BUCKET }}" >> .env
          echo "IOS_API_KEY=${{ secrets.IOS_API_KEY }}" >> .env
          echo "IOS_APP_ID=${{ secrets.IOS_APP_ID }}" >> .env
          echo "IOS_BUNDLE_ID=${{ secrets.IOS_BUNDLE_ID }}" >> .env

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Tests
        run: flutter test --dart-define-from-file=.env

      - name: Build APK
        run: |
          # Increment version in pubspec.yaml or use build-number flag
          # Here we'll use build-number flag which is cleaner for CI
          flutter build apk --release --dart-define-from-file=.env --build-name=1.0.${{ github.run_number }} --build-number=${{ github.run_number }} --no-tree-shake-icons

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to Firebase App Distribution
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
          --app ${{ secrets.FIREBASE_APP_ID }} \
          --groups testers \
          --release-notes "${{ github.event.head_commit.message }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}